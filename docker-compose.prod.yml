services:
  postgres:
    image: postgres:16-alpine
    container_name: hunter_system_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-hunter}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-hunter_system}
    volumes:
      - hunter_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-hunter} -d ${DB_NAME:-hunter_system}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hunter_system_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env.prod
    command: [ "/app/bot" ]

  migrate:
    image: migrate/migrate
    container_name: hunter_system_migrate
    volumes:
      - ./migrations:/migrations
    command: [ "-path", "/migrations", "-database", "${DATABASE_URL}", "up" ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  hunter_pg_data:
