services:
  postgres:
    image: postgres:16-alpine
    container_name: hunter_system_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-hunter}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hunter}
      POSTGRES_DB: ${DB_NAME:-hunter_system}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - hunter_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hunter} -d ${DB_NAME:-hunter_system}"]
      interval: 5s
      timeout: 5s
      retries: 10

